name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [debian, fedora]
        test: [install, prompt]
    name: e2e / ${{ matrix.platform }} / ${{ matrix.test }}
    steps:
      - uses: actions/checkout@v4

      - name: Run E2E test
        run: ./tests/e2e/run.sh --platform ${{ matrix.platform }} --test ${{ matrix.test }}
